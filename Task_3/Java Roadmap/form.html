<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page</title>
</head>
<body>
   
     <form>

        <div>
             <h1>Exercise website Registration</h1>
        </div>

        <div>
            <b>Name</b>
            <span>*</span>
            <span>:</span>
            <input type="text" id="playerName" name="playerName" required>
        </div>

        <div>
            <b>Email</b>
            <span>*</span>
            <span>:</span>
            <input type="email" id="email" name="email">
        </div>

        <div>
            <b>Password</b>
            <span>*</span>
            <span>:</span>
            <input type="password" id="password" name="password">
        </div>

        <div>
            <b>Confirm Password</b>
            <span>*</span>
            <span>:</span>
            <input type="password" id="confirmPassword" name="confirmPassword">
        </div>

        <div>
            <b>Age</b>
            <span>*</span>
            <span>:</span>
            <input type="number" id="age" name="age">
        </div>

        <div>
            <b>Contact Number</b>
            <span>*</span>
            <span>:</span>
            <input type="tel" id="phone" name="phone">
        </div>

        <div>
            <b>Gender</b>
            <span>*</span>
            <span>:</span>
            <input type="radio" id="Male" name="candidat">Male
            <input type="radio" id="Female" name="candidat">Female
        </div>

        

        <div>
            <input type="reset" id="reset" name="reset" value="Clear Form">
        </div>

        <div>
            <input type="submit" id="submit" name="submit" value="Register">
        </div>

    </form>
 
</body>
</html>
