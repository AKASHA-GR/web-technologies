<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <h1>Registration Form</h1>
        <div class="mb-3">
            <label for="formGroupExampleInput" class="form-label">NAME:</label>
            <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Enter your name">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput2" class="form-label">EMAIL:</label>
            <input type="email" class="form-control" id="formGroupExampleInput2" placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput3" class="form-label">PHONE:</label>
            <input type="text" class="form-control" id="formGroupExampleInput3" placeholder="Enter your phone number">
        </div>
        <div class="mb-3">
            <label for="formGroupExampleInput4" class="form-label">ADDRESS:</label>
            <input type="text" class="form-control" id="formGroupExampleInput4" placeholder="Enter your address">
        </div>
        <input type="submit" class="btn btn-primary" value="Submit" onclick="submitForm()">
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>





</html>
