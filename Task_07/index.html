<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From page</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
</head>

<body>
    <h1>Registration Form</h1>

    <form name="registerform" onsubmit="return formValidate()">
        <div>
            <label for="namefield">Name</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="text" id="namefield" name="name" required>
        </div>

        <div>
            <label for="emailfield">Email</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="email" id="emailfield" name="email" required>
        </div>

        <div>
            <label for="phonefield">Phone</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="tel" id="phonefield" name="phone" required>
        </div>

        <div>
            <label for="passwordfield">Password</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="password" id="passwordfield" name="password" required>
        </div>

        <div>
            <label for="confirmPasswordfield">Confirm Password</label>
            <span style="color: red;">*</span>
            <span>:</span>
            <input type="password" id="confirmPasswordfield" name="confirm_password" required>
        </div>
        <div>
            <button type="submit" name="submit">Submit</button>
            <button type="reset" name="clear">Clear</button>
        </div>
    </form>

</body>

</html>
